# SPDX-License-Identifier: Apache-2.0
name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install the reference implementation (zero runtime deps)
        run: python -m pip install ./reference/impl

      - name: Invariant test suite (the proofs, incl. the vendor/codename de-brand guard)
        working-directory: reference/impl
        run: python -m unittest discover -t . -s tests -p "test_*.py" -v

      - name: Real-signing tests with the crypto extra (Ed25519)
        working-directory: reference/impl
        run: |
          python -m pip install ".[crypto]"
          python -m unittest tests.test_signing -v

      - name: Demo runs end-to-end
        working-directory: reference/impl
        run: python run_demo.py --scenario all

      - name: CLI smoke test
        run: |
          indras-net version
          indras-net scenarios
          indras-net run "summarize the quarterly report"
